<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Critter Quest — English Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    /* core palette */
    --ink: #1a1420;
    --ink-2: #3d2b3f;
    --paper: #f4e8c8;
    --paper-2: #e8d8a8;

    /* grass/terrain */
    --grass-1: #a8d858;
    --grass-2: #8fc74a;
    --grass-3: #6ba832;
    --grass-4: #4a7c2a;
    --grass-dark: #2d5020;

    /* path */
    --path-1: #f0d890;
    --path-2: #d8b868;
    --path-3: #a88844;

    /* water */
    --water-1: #8fe0f0;
    --water-2: #4ab8d8;
    --water-3: #2870a8;

    /* sand */
    --sand-1: #f8e4b0;
    --sand-2: #d8b870;

    /* stone */
    --stone-1: #b8b0a8;
    --stone-2: #786c68;

    /* elements */
    --fire: #e54b4b;
    --fire-2: #f89040;
    --leaf: #6fb544;
    --leaf-2: #a8d858;
    --spark: #f4c430;
    --spark-2: #fce078;
    --shine: #b572d9;
    --shine-2: #d8a8e8;
    --water-el: #4ab8d8;

    --ui-bg: #fff4d8;
    --ui-bg-2: #e8d8a8;
    --ui-border: #3d2b3f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'VT323', monospace;
    background: #1a1420;
    color: var(--ink);
    image-rendering: pixelated;
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: none;
    font-smooth: never;
  }

  body {
    background:
      repeating-linear-gradient(0deg, #120c18 0 2px, #1a1420 2px 4px);
    min-height: 100vh;
    padding: 16px;
    display: flex;
    justify-content: center;
  }

  #root { width: 100%; max-width: 720px; }

  /* Pixel font utilities */
  .pixel { font-family: 'Press Start 2P', monospace; }
  .big   { font-family: 'VT323', monospace; }

  /* Hard pixel border (no rounded, layered outline) */
  .panel {
    background: var(--ui-bg);
    border: 3px solid var(--ui-border);
    box-shadow:
      0 0 0 3px var(--ui-bg),
      0 0 0 6px var(--ui-border),
      6px 6px 0 6px rgba(0,0,0,.35);
    position: relative;
  }

  /* small panel (single-border) */
  .chip {
    background: var(--ui-bg);
    border: 3px solid var(--ui-border);
    box-shadow: 3px 3px 0 0 rgba(0,0,0,.35);
    padding: 6px 10px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    line-height: 1;
    color: var(--ink);
    cursor: default;
    user-select: none;
  }

  /* Pixel corner trim — adds the classic "notched" look */
  .notch {
    position: relative;
  }
  .notch::before, .notch::after {
    content: "";
    position: absolute;
    width: 6px; height: 6px;
    background: var(--ui-border);
  }
  .notch::before { top: -3px; left: -3px; box-shadow: 6px 0 0 var(--ui-border), 0 6px 0 var(--ui-border); }
  .notch::after  { bottom: -3px; right: -3px; box-shadow: -6px 0 0 var(--ui-border), 0 -6px 0 var(--ui-border); }

  /* Buttons */
  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--ink);
    background: var(--spark-2);
    border: 3px solid var(--ui-border);
    padding: 12px 16px;
    cursor: pointer;
    box-shadow: 4px 4px 0 0 var(--ink);
    transition: transform 60ms ease, box-shadow 60ms ease;
    image-rendering: pixelated;
    letter-spacing: 0.5px;
  }
  .btn:hover { transform: translate(1px, 1px); box-shadow: 3px 3px 0 0 var(--ink); }
  .btn:active { transform: translate(4px, 4px); box-shadow: 0 0 0 0 var(--ink); }
  .btn:disabled { filter: grayscale(0.6) brightness(0.9); cursor: not-allowed; }

  .btn.fire  { background: #ffb070; }
  .btn.leaf  { background: #c8e890; }
  .btn.water { background: #9ee0f0; }
  .btn.spark { background: #fce078; }
  .btn.shine { background: #e0b8f0; }

  /* MAP */
  .map-frame {
    position: relative;
    background: var(--grass-3);
    border: 4px solid var(--ink);
    box-shadow:
      inset 0 0 0 4px #2d5020,
      inset 0 0 0 8px #6ba832,
      6px 6px 0 0 rgba(0,0,0,.35);
    padding: 14px;
    image-rendering: pixelated;
  }

  .map-canvas {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    image-rendering: pixelated;
    overflow: hidden;
    border: 3px solid #2d5020;
    background:
      /* subtle grass dapple */
      radial-gradient(circle at 25% 30%, rgba(255,255,255,.06) 0 2px, transparent 3px),
      radial-gradient(circle at 70% 60%, rgba(255,255,255,.05) 0 2px, transparent 3px),
      /* grass tile pattern - using repeating steps */
      repeating-linear-gradient(0deg,  var(--grass-2) 0 8px, var(--grass-3) 8px 16px),
      repeating-linear-gradient(90deg, rgba(0,0,0,.04) 0 8px, transparent 8px 16px);
  }

  /* Pixel grass texture layer (tiny tufts) */
  .map-canvas::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      /* random tufts as tiny radial dots */
      radial-gradient(circle at 10% 15%, var(--grass-dark) 1px, transparent 2px),
      radial-gradient(circle at 22% 70%, var(--grass-dark) 1px, transparent 2px),
      radial-gradient(circle at 35% 40%, var(--grass-dark) 1px, transparent 2px),
      radial-gradient(circle at 48% 85%, var(--grass-dark) 1px, transparent 2px),
      radial-gradient(circle at 60% 10%, var(--grass-dark) 1px, transparent 2px),
      radial-gradient(circle at 75% 35%, var(--grass-dark) 1px, transparent 2px),
      radial-gradient(circle at 88% 75%, var(--grass-dark) 1px, transparent 2px),
      radial-gradient(circle at 92% 22%, var(--grass-dark) 1px, transparent 2px),
      radial-gradient(circle at 5% 55%, var(--grass-dark) 1px, transparent 2px);
    pointer-events: none;
    opacity: .6;
  }

  /* Water pond (top) - pixelated blocks */
  .water-tile {
    position: absolute;
    background:
      repeating-linear-gradient(0deg, var(--water-1) 0 4px, var(--water-2) 4px 8px),
      var(--water-2);
    border: 3px solid var(--water-3);
    box-shadow: inset 0 0 0 3px var(--water-1);
    image-rendering: pixelated;
  }

  /* Sand beach tile */
  .sand-tile {
    position: absolute;
    background:
      radial-gradient(circle at 20% 30%, rgba(168,136,68,.35) 1px, transparent 2px),
      radial-gradient(circle at 60% 70%, rgba(168,136,68,.35) 1px, transparent 2px),
      radial-gradient(circle at 80% 20%, rgba(168,136,68,.35) 1px, transparent 2px),
      radial-gradient(circle at 35% 85%, rgba(168,136,68,.35) 1px, transparent 2px),
      repeating-linear-gradient(45deg, var(--sand-1) 0 4px, var(--sand-2) 4px 8px);
    border: 3px solid #a88844;
    box-shadow: inset 0 0 0 2px var(--sand-1);
    image-rendering: pixelated;
  }

  /* Wandering sprite (NPCs & critters walking on the map) */
  .walker {
    position: absolute;
    pointer-events: none;
    transform: translate(-50%, -50%);
    image-rendering: pixelated;
    z-index: 3;
  }
  @keyframes walkBob {
    0%,100% { transform: translate(-50%, -50%) translateY(0); }
    50%     { transform: translate(-50%, -50%) translateY(-1.5px); }
  }
  .walker > div { animation: walkBob 0.4s steps(2) infinite; }

  /* Different walk patterns (each walker gets one at random) */
  @keyframes roamA { 0%   { left: 20%; top: 82%; }
                     25%  { left: 55%; top: 80%; }
                     50%  { left: 62%; top: 55%; }
                     75%  { left: 40%; top: 58%; }
                     100% { left: 20%; top: 82%; } }
  @keyframes roamB { 0%   { left: 82%; top: 42%; }
                     33%  { left: 78%; top: 62%; }
                     66%  { left: 55%; top: 65%; }
                     100% { left: 82%; top: 42%; } }
  @keyframes roamC { 0%   { left: 18%; top: 42%; }
                     50%  { left: 28%; top: 62%; }
                     100% { left: 18%; top: 42%; } }
  @keyframes roamD { 0%   { left: 50%; top: 25%; }
                     50%  { left: 58%; top: 42%; }
                     100% { left: 50%; top: 25%; } }
  @keyframes roamE { 0%   { left: 38%; top: 14%; }
                     50%  { left: 60%; top: 18%; }
                     100% { left: 38%; top: 14%; } }
  .roam-a { animation: roamA 18s linear infinite; }
  .roam-b { animation: roamB 14s linear infinite; }
  .roam-c { animation: roamC 12s linear infinite; }
  .roam-d { animation: roamD 10s linear infinite; }
  .roam-e { animation: roamE 16s linear infinite; }

  /* Paths between nodes - pixelated dashed roads */
  .path-line {
    position: absolute;
    background:
      repeating-linear-gradient(
        to right,
        var(--path-2) 0 8px,
        var(--path-3) 8px 12px,
        var(--path-2) 12px 20px
      );
    border-top: 3px solid var(--path-3);
    border-bottom: 3px solid var(--path-3);
    height: 14px;
    transform-origin: 0 50%;
    pointer-events: none;
    box-shadow: 0 0 0 1px var(--path-1);
  }

  /* Trees / decor */
  .decor {
    position: absolute;
    image-rendering: pixelated;
    pointer-events: none;
  }

  /* Node (location) */
  .node {
    position: absolute;
    width: 72px; height: 80px;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    image-rendering: pixelated;
    transition: transform 80ms ease;
  }
  .node:hover { transform: translate(-50%, calc(-50% - 3px)); }
  .node.active .node-tile { box-shadow: 0 0 0 3px #fff, 0 0 0 6px var(--ink), 0 0 0 9px var(--spark), 4px 4px 0 9px rgba(0,0,0,.3); }

  .node-tile {
    width: 56px; height: 48px;
    background: var(--ui-bg);
    border: 3px solid var(--ink);
    box-shadow: 3px 3px 0 0 rgba(0,0,0,.4);
    display: grid;
    place-items: center;
    image-rendering: pixelated;
    position: relative;
    overflow: hidden;
  }
  .node-label {
    margin-top: 5px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #fff;
    text-shadow:
      -1px -1px 0 var(--ink),
       1px -1px 0 var(--ink),
      -1px  1px 0 var(--ink),
       1px  1px 0 var(--ink),
       0    2px 0 var(--ink);
    text-align: center;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .node-cost {
    margin-top: 3px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--spark-2);
    text-shadow: 1px 1px 0 var(--ink);
  }

  /* Corner badges on the frame */
  .corner-badge {
    position: absolute;
    width: 56px; height: 56px;
    background: var(--ui-bg);
    border: 3px solid var(--ink);
    box-shadow: 3px 3px 0 0 rgba(0,0,0,.35);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    z-index: 5;
  }
  .corner-badge.tl { top: -10px; left: -10px; border-color: var(--leaf); }
  .corner-badge.tr { top: -10px; right: -10px; border-color: var(--spark); }
  .corner-badge.bl { bottom: -10px; left: -10px; border-color: var(--fire); }
  .corner-badge.br { bottom: -10px; right: -10px; border-color: var(--shine); }

  .corner-badge .count {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--ink);
  }

  /* Pixel sprite wrapper — forces crisp edges */
  .sprite {
    display: inline-block;
    image-rendering: pixelated;
  }

  /* Top stat-pills row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 10px 0 12px;
  }
  .stat-pill {
    background: var(--ui-bg);
    border: 3px solid var(--ink);
    box-shadow: 3px 3px 0 0 rgba(0,0,0,.35);
    padding: 8px 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--ink);
  }
  .stat-pill.fire  { border-color: var(--fire); background: #fff0e4; }
  .stat-pill.leaf  { border-color: var(--leaf); background: #effbe0; }
  .stat-pill.spark { border-color: var(--spark); background: #fffbdc; }
  .stat-pill.shine { border-color: var(--shine); background: #f7ecfc; }

  /* Top header */
  header.topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--ui-bg);
    border: 3px solid var(--ink);
    box-shadow: 4px 4px 0 0 rgba(0,0,0,.35);
    margin-bottom: 12px;
  }
  header.topbar h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--ink);
    letter-spacing: 1px;
    flex: 1;
    line-height: 1.2;
  }
  header.topbar .sub {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--ink-2);
    line-height: 1;
    margin-top: 4px;
    display: block;
  }

  .hud-chip {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 8px 10px;
    border: 3px solid var(--ink);
    background: var(--ui-bg);
    box-shadow: 3px 3px 0 0 rgba(0,0,0,.35);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Village/action panel */
  .village-panel {
    background: var(--ui-bg);
    border: 3px solid var(--ink);
    box-shadow: 4px 4px 0 0 rgba(0,0,0,.35);
    margin-top: 14px;
    padding: 14px;
  }
  .village-panel .row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }
  .village-panel .title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .village-panel .subtitle {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--ink-2);
    line-height: 1;
  }

  /* Critter roster */
  .roster {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .critter {
    border: 3px solid var(--ink);
    background: var(--ui-bg);
    box-shadow: 3px 3px 0 0 rgba(0,0,0,.35);
    padding: 8px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--ink);
    transition: transform 80ms ease;
    user-select: none;
  }
  .critter:hover { transform: translate(0, -2px); }
  .critter.fire  { background: #ffd8b8; }
  .critter.leaf  { background: #d0f0a8; }
  .critter.spark { background: #fce890; }
  .critter.shine { background: #e8c8f0; }

  /* Toast */
  .toast {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--spark-2);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 12px 16px;
    border: 3px solid var(--spark);
    box-shadow: 4px 4px 0 0 rgba(0,0,0,.5);
    z-index: 100;
    animation: toastIn 200ms ease-out;
  }
  @keyframes toastIn { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

  /* blink */
  @keyframes blink { 50% { opacity: 0; } }
  .blink { animation: blink 1s steps(2) infinite; }

  /* subtle water shimmer */
  @keyframes shimmer {
    0%   { background-position: 0 0, 0 0; }
    100% { background-position: 16px 0, 0 0; }
  }
  .water-tile { animation: shimmer 2s steps(4) infinite; background-size: 8px 8px, 100% 100%; }

  /* bouncing village icon */
  @keyframes hop {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-2px); }
  }
  .hop { animation: hop 1s steps(2) infinite; }

  /* Rest button row */
  .rest-btn {
    width: 100%;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    padding: 14px;
    background: var(--leaf-2);
    border: 3px solid var(--ink);
    box-shadow: 4px 4px 0 0 var(--ink);
    cursor: pointer;
    color: var(--ink);
    letter-spacing: 1px;
  }
  .rest-btn:hover { transform: translate(1px, 1px); box-shadow: 3px 3px 0 0 var(--ink); }
  .rest-btn:active { transform: translate(4px, 4px); box-shadow: 0 0 0 0 var(--ink); }
  .rest-btn:disabled { filter: grayscale(0.6) brightness(0.92); cursor: not-allowed; }

  .reset-link {
    display: inline-block;
    margin-top: 14px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #b8a8d8;
    background: none;
    border: 0;
    cursor: pointer;
    text-decoration: underline;
    padding: 4px;
  }
  .reset-link:hover { color: var(--spark-2); }

  /* footer label under map */
  .map-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #b8a8d8;
  }

  /* tweaks panel */
  .tweaks {
    position: fixed;
    right: 12px;
    bottom: 12px;
    width: 240px;
    background: var(--ink);
    color: var(--spark-2);
    border: 3px solid var(--spark);
    box-shadow: 4px 4px 0 0 rgba(0,0,0,.6);
    padding: 12px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    z-index: 200;
    display: none;
  }
  .tweaks.open { display: block; }
  .tweaks h3 { font-size: 10px; margin-bottom: 10px; color: var(--spark); }
  .tweaks label { display: block; margin: 8px 0 4px; font-size: 8px; }
  .tweaks select, .tweaks input[type=range] {
    width: 100%;
    background: var(--ink-2);
    color: var(--spark-2);
    border: 2px solid var(--spark);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 4px;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useMemo, useRef } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "mapPalette": "meadow",
    "spriteScale": 4,
    "showGrid": false,
    "dayTime": "day"
  }/*EDITMODE-END*/;

  /* ============================================================
     PIXEL SPRITE ENGINE
     A sprite is a 2D array of pixel indices → palette of colors.
     "." = transparent. Renders to inline <div> grid, no canvas.
     ============================================================ */

  function PixelSprite({ data, palette, scale = 3, className = "", style = {} }) {
    const w = data[0].length;
    const h = data.length;
    return (
      <div className={"sprite " + className} style={{
        display: 'grid',
        gridTemplateColumns: `repeat(${w}, ${scale}px)`,
        gridTemplateRows: `repeat(${h}, ${scale}px)`,
        width: w * scale,
        height: h * scale,
        ...style
      }}>
        {data.flatMap((row, y) => row.split('').map((ch, x) => (
          <div key={`${x}-${y}`} style={{
            background: ch === '.' ? 'transparent' : palette[ch] || 'transparent',
            width: scale, height: scale
          }} />
        )))}
      </div>
    );
  }

  /* =============== Critter Sprites (ORIGINAL designs) =============== */

  // Voltpip (spark) — yellow spiky blob with bolt mark
  const VOLTPIP = {
    data: [
      "....11....",
      "...1221...",
      "..122221..",
      ".12232221.",
      ".12233221.",
      "12222222221".padEnd(10, '.').slice(0,10),
      "14422244..",  // feet
      ".122222...",
      "..1..1....",
      ".3....3...",
    ],
    palette: { '1': '#f4c430', '2': '#fce078', '3': '#1a1420', '4': '#e08800' }
  };

  // Cleaner Voltpip
  const VOLTPIP_S = {
    data: [
      "..1..1....",
      ".121.121..",
      ".1221221..",
      "12222222..",
      "12232232..",
      "12222222..",
      "12222222..",
      ".144244...",
      "..3..3....",
    ],
    palette: { '1': '#d8a820', '2': '#fce078', '3': '#1a1420', '4': '#a87800' }
  };

  // Leafling (leaf) — green blob with sprout
  const LEAFLING = {
    data: [

        mp: s.mp - node.cost,

            ● SPEND MP AT EACH STOP<br/>
            ● REST AT VILLAGE TO RECOVER
          </div>
        </div>

        {/* Apply palette tweak via style vars */}
        <style>{`
          ${tweaks.dayTime === 'dusk' ? `
            body { background: repeating-linear-gradient(0deg, #2a1820 0 2px, #3a2030 2px 4px) !important; }
            .map-canvas { filter: hue-rotate(-10deg) brightness(0.9) saturate(1.1); }
          ` : ''}
          ${tweaks.dayTime === 'night' ? `
            body { background: repeating-linear-gradient(0deg, #0a0812 0 2px, #121018 2px 4px) !important; }
            .map-canvas { filter: brightness(0.55) saturate(1.3) hue-rotate(-20deg); }
          ` : ''}
          ${tweaks.mapPalette === 'autumn' ? `
            .map-canvas { filter: hue-rotate(-30deg) saturate(1.2); }
          ` : ''}
          ${tweaks.mapPalette === 'frost' ? `
            .map-canvas { filter: hue-rotate(160deg) saturate(0.7) brightness(1.05); }
          ` : ''}
        `}</style>
      </div>
    );
  }

  function CornerBadge({ pos, element, count, cap }) {
    const meta = ELEMENT_META[element];
    return (
      <div className={`corner-badge ${pos}`}>
        <span style={{ color: meta.color, fontSize: 14, lineHeight: 1 }}>{meta.icon}</span>
        <span className="count">{count}/{cap}</span>
      </div>
    );
  }

  function TreeCluster({ positions }) {
    return positions.map(([x, y], i) => (
      <div key={i} className="decor" style={{ left: `${x}%`, top: `${y}%`, transform: 'translate(-50%,-50%)' }}>
        <PixelSprite data={TREE.data} palette={TREE.palette} scale={1.5 + (i % 3) * 0.3} />
      </div>
    ));
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
